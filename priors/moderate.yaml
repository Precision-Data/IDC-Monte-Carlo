# IDC Monte Carlo - Moderate prior set
# Authoritative source: ANALYSIS_PLAN.md Section 4.
# Every (alpha, beta) value below is copied verbatim from the plan tables.
# Do not edit numeric values without a deviation entry in DEVIATIONS.md
# and a plan version bump.

name: moderate
plan_section: "4"
plan_version: "1.1"
description: >
  Moderate prior set. Centred at literature midpoints with reduced
  precision relative to the optimistic set, reflecting cross-study
  variability.

parameters:
  E0:
    description: "Initial confabulation rate (per AI-generated claim)."
    mean: 0.0250
    precision: 500
    alpha: 12.5
    beta: 487.5
    ci_95_plan: [0.0140, 0.0395]
    citation: >
      Asgari E, Montana-Brown N, Dubois M, et al. A framework to assess
      clinical safety and hallucination rates of LLMs for medical text
      summarisation. npj Digital Medicine 8, 274 (2025).
      DOI: 10.1038/s41746-025-01670-7.
    plan_subsection: "4.1"

  epsilon:
    description: >
      Entrenchment rate: probability that a confabulation escapes
      physician review and is signed into the medical record.
    mean: 0.30
    precision: 30
    alpha: 9.0
    beta: 21.0
    ci_95_plan: [0.156, 0.469]
    citation: >
      No direct measurement available. Indirect anchors: Shaw and Nave
      (2026) cognitive surrender; Goddard et al. (2012) automation bias
      systematic review; Rumale Vishwanath et al. (KDD 2024) 92-minute
      verification burden.
    plan_subsection: "4.2"

  P:
    description: >
      Per-encounter propagation factor: probability an entrenched
      confabulation appears in a subsequent encounter via copy-forward,
      template re-use, or AI context conditioning.
    mean: 0.50
    precision: 20
    alpha: 10.0
    beta: 10.0
    ci_95_plan: [0.289, 0.711]
    citation: >
      Wang MD, Khanna R, Najafi N. Characterizing the Source of Text in
      Electronic Health Record Progress Notes. JAMA Internal Medicine
      177(8), 1212-1213 (2017). DOI: 10.1001/jamainternmed.2017.1548.
      Supporting: Steinkamp J, Kantrowitz JJ, Airan-Javia S. Appl Clin
      Inform 13(1), 88-95 (2022).
    plan_subsection: "4.3"

  R:
    description: >
      Per-encounter de-entrenchment rate: probability that an entrenched
      confabulation is identified and removed at any subsequent
      encounter. Higher R reduces contamination (note inverted
      directionality).
    mean: 0.02
    precision: 100
    alpha: 2.0
    beta: 98.0
    ci_95_plan: [0.003, 0.057]
    citation: >
      No direct measurement available. Indirect anchors: Bell SK et al.
      JAMA Network Open 3, e205867 (2020); Tsou AY et al. Appl Clin
      Inform 8, 12-34 (2017).
    plan_subsection: "4.4"

# Omission-adjusted epsilon (Section 4.2, error-type asymmetry).
# mu shifted by +0.20 from base epsilon, capped at 0.95; precision preserved.
omission_adjustments:
  epsilon:
    description: >
      Entrenchment rate for OMISSION errors. Shifted upward because
      physician review cannot detect absent content without independent
      re-derivation from primary source documents.
    mean: 0.50            # 0.30 + 0.20
    precision: 30         # preserved from base epsilon
    alpha: 15.0
    beta: 15.0
    rationale: "mu shifted by +0.20 per Section 4.2; precision preserved."
